dm:
  functions:
    yourfunctionhere: Callable[[...], Any]
  constants:
    yourconstantname: yourconstanthere
    approximations:
      yourapproximationname:
        f32:
          nearest:
            significand: int
            exponent: int
          residual:
            significand: int
            exponent: int
        f64:
          nearest:
            significand: int
            exponent: int
          residual:
            significand: int
            exponent: int
        f128:
          nearest:
            significand: int
            exponent: int
          residual:
            significand: int
            exponent: int
        d64:
          nearest:
            significand: int
            exponent: int
          residual:
            significand: int
            exponent: int
        d128:
          nearest:
            significand: int
            exponent: int
          residual:
            significand: int
            exponent: int
  unicode: # a namespace tree of unicode characters
    yourunicodehere
  sets:
    yoursetname:
      indicator: Callable[[T], bool] # "does x belong in this set?"
      cardinality: Cardinal # size/count of the set
      wellorders: # assuming axiom of choice. daamath is ZFC.
        yourwellordername:
          # none of these are required. they are all optional
          relation: Callable[[T, T], bool] # the well-order as a binary relation
          ordinality: Ordinal # the order type of the set
          ordinal_of: Callable[[T], Ordinal] # the ordinal bijecting to an element
          element_at: Callable[[Ordinal], T] # the element bijecting to an ordinal
          covers: Callable[[T, T], bool] # is "a covers b" true?
          least: T # the minimal element of the well-order
          greatest: T # the maximal element of the well-order
          successor: Callable[[T], T] # return the covering element
          predecessor: Callable[[T], T] # return the element it covers


