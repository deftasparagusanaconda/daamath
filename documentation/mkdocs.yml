# cause theres no alternative to awesome-nav yet for zensical
nav:
  - home: index.md
  - install: https://deftasparagusanaconda.github.io/daamath/#install
  - specification: 
    - specification/index.md
    - domains: specification/domains.md
    - orders: specification/orders.md
    - datatypes: specification/datatypes.md
    - context: specification/context.md
    - functions:
      - specification/functions/index.md
      - arithmetic: specification/functions/arithmetic.md
      - trigonometry: specification/functions/trigonometry.md
      - logic: specification/functions/logic.md
      - order: specification/functions/order.md
      - quantize: specification/functions/quantize.md
    - constants: specification/constants.md
    - strings: specification/strings.md
    - namespace: specification/namespace.md
    - errors: specification/errors.md
    - enums: specification/enums.md
    - flags: specification/flags.md
  - implementations: 
    - implementations/index.md
    - python:
      - implementations/python/index.md
      - implementations/python/install.md
    - c:
      - implementations/c/index.md
      - implementations/c/install.md

site_name: daamath
site_url: https://deftasparagusanaconda.github.io/daamath
repo_url: https://github.com/deftasparagusanaconda/daamath
repo_name: github

theme: 
  #name: readthedocs
  name: material
  #name: mkdocs
  language: en
  font: #false # conform to system's fonts
    text: Source Sans 3
    # text: Source Serif 4
    # text: Inter
    # text: Liberata
    # text: Spectral
    # text: Lora
    # text: Fraunces
    # text: Newsreader
    # text: Noto Serif
    # text: Palatino
    # text: GFS Didot
    # text: Roboto
    # text: Atkinson Hyperlegible
    code: Source Code Pro
    # code: Roboto Mono
    # code: Jetbrains Mono
  features:
#    - navigation.instant
#    - navigation.instant.prefetch
#    - navigation.instant.progress
    - navigation.indexes
    - navigation.tracking
    #- navigation.expand
    #- navigation.sections
    - navigation.top
    - navigation.tabs
    - navigation.footer
    #- navigation.tabs.sticky
    #- navigation.path
    #- navigation.prune 
    #- toc.follow  
    #- content.action.edit # Edit this page
    #- content.action.view  # View source of this page
    - content.code.select
    - content.code.copy
#      - icon: material/weather-sunny
    - content.code.annotate
  palette:
    # Palette toggle for automatic mode
    - media: "(prefers-color-scheme)"
      primary: black  
      accent: purple  
      toggle:
        icon: material/brightness-auto
        name: auto

    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      primary: white
      accent: purple
      scheme: default 
      toggle:
        icon: material/weather-sunny
        name: light

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      primary: black
      accent: purple
      scheme: slate
      toggle:
        icon: material/weather-night
        name: dark
    
  favicon: assets/logo.svg
  logo: assets/logo.svg
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  #- marimo
  - include-markdown
  - awesome-nav
  - social  # social cards
  #- toggle-sidebar
  #- git-revision-date-localized:
  #    enable_creation_date: true
  - optimize
  #- offline  # absolutely not
  
# for file inclusions. an alternative to the include-markdown plugin
#markdown_extensions:
#  - pymdownx.snippets:
#    base_path:
#      - '.'
#      - '../..'

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
extra:
  generator: true
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/deftasparagusanaconda/daamath
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/daamath
    - icon: fontawesome/brands/discord
      link: https://discord.com/users/608255432859058177

