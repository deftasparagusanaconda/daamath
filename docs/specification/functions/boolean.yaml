not:
  description: negation
  syntax: ¬a
  signatures:
    boolean:
      domains:
        - a: boolean
      codomain: boolean
    function:
      domains:
        - a: function
      codomain: function
    dynamic:
      domains:
        - a: vor([boolean function])
      codomain: vor([boolean function])

and:
  description: conjunction
  syntax: a ∧ b
  signatures:
    boolean:
      domains:
        - a: boolean
        - b: boolean
      codomain: boolean
    function:
      domains:
        - a: function
        - b: function
      codomain: function
    dynamic:
      domains:
        - a: vor([boolean function])
        - a: vor([boolean function])
      codomain: vor([boolean function])

or:
  description: disjunction 
  syntax: a ∨ b
  signatures:
    boolean:
      domains:
        - a: boolean
        - b: boolean
      codomain: boolean
    function:
      domains:
        - a: function
        - b: function
      codomain: function
    dynamic:
      domains:
        - a: vor([boolean function])
        - a: vor([boolean function])
      codomain: vor([boolean function])

xor:
