[project.theme]
font.text = "Inter"
font.code = "JetBrains Mono"
favicon = "assets/logo.svg"
logo    = "assets/logo.svg"
custom_dir = "docs_overrides"
#variant = "classic"

features = [
  "navigation.indexes",
  "navigation.tracking",
  "navigation.top",
  "navigation.tabs",
  #"navigation.path",
  "navigation.expand",
  #"navigation.tabs.sticky",
  #"navigation.prune",
  "navigation.footer",
  "navigation.instant",
  "navigation.instant",
  "navigation.instant.prefetch",
  "",
  "content.code.select",
  "content.code.copy",
  "content.code.annotate",
  #"header.autohide",
]

[project.theme.icon]
repo = "fontawesome/brands/github"

# auto mode
[[project.theme.palette]]
media = "(prefers-color-scheme)"
toggle.icon = "material/brightness-auto"
toggle.name = "auto"

# light
[[project.theme.palette]]
media  = "(prefers-color-scheme: light)"
scheme  = "default"
primary = "white"
accent  = "purple"
toggle.icon = "material/weather-sunny"
toggle.name = "light"

# dark
[[project.theme.palette]]
media  = "(prefers-color-scheme: dark)"
scheme  = "slate"
primary = "black"
accent  = "purple"
toggle.icon = "material/weather-night"
toggle.name = "dark"

[project.extra]
generator = true

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/deftasparagusanaconda/daamath"

[[project.extra.social]]
icon = "fontawesome/brands/python"
link = "https://pypi.org/project/daamath"

[[project.extra.social]]
icon = "fontawesome/brands/discord"
link = "https://discord.com/users/608255432859058177"

[project.plugins]
search    = {}
#include-markdown = {}
#awesome-nav = {}
social    = {}
optimize  = {}

