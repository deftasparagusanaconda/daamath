# this file is also ai-generated

# canonical = ITRANS (ascii, capitalisation marks retroflex vs dental — systematic)
# IAST scientific transliteration given in comments (precise, diacritic)
# devanagari is an abugida: consonants carry inherent "a"; matras override the vowel when attached

svar: # vowels in their independent form
  a: अ
  aa: आ # IAST: ā
  i: इ
  ii: ई # IAST: ī
  u: उ
  uu: ऊ # IAST: ū
  RRi: ऋ # IAST: ṛ
  e: ए
  ai: ऐ
  o: ओ
  au: औ

vyanjan: # constants
  k: क
  kh: ख
  g: ग
  gh: घ
  NN: ङ # IAST: ṅa
  ch: च # IAST: ca
  Ch: छ # IAST: cha
  j: ज
  jh: झ
  JN: ञ # IAST: ña
  T: ट # IAST: ṭa
  Th: ठ # IAST: ṭha
  D: ड # IAST: ḍa
  Dh: ढ # IAST: ḍha
  N: ण # IAST: ṇa
  t: त
  th: थ
  d: द
  dh: ध
  n: न
  p: प
  ph: फ
  b: ब
  bh: भ
  m: म
  y: य
  r: र
  l: ल
  v: व
  sh: श # IAST: śa
  Sh: ष # IAST: ṣa
  s: स
  h: ह
  L: ळ # IAST: ḷa
matra: # dependent vowel signs, attach to consonant to override inherent a
  aa: ा # IAST: ā
  i: ि
  ii: ी # IAST: ī
  u: ु
  uu: ू # IAST: ū
  RRi: ृ # IAST: ṛ
  e: े
  ai: ै
  o: ो
  au: ौ

special:
  virama: ् # kills inherent a, gives bare consonant
  anusvara: ं # nasalisation, IAST: ṃ
  visarga: ः # voiceless breath, IAST: ḥ
