# this file is an official collection of all the functions daamath handles

succ:
  description: successor. solves for b in ++a = b
  domains:
    - a: COMPLEX
  codomain: COMPLEX
pred:
  description: predecessor. solves for a in ++a = b
  domains:
    - b: COMPLEX
  codomain: COMPLEX
add:
  description: addition. solves for c in a + b = c
  domains:
    - a: COMPLEX
    - b: COMPLEX
  codomain: COMPLEX
sub:
  description: subtraction. solves for a in a + b = c
  domains:
    - c: COMPLEX
    - b: COMPLEX
  codomain: COMPLEX
bus:
  description: bustraction. solves for b in a + b = c
  domains:
    - c: COMPLEX
    - a: COMPLEX
  codomain: COMPLEX
mul:
  description: multiplication. solves for c in a × b = c
  domains:
    - a: COMPLEX
    - b: COMPLEX
  codomain: COMPLEX
div:
  description: division. solves for a in a × b = c
  domains:
    - c: COMPLEX
    - b: COMPLEX
  codomain: COMPLEX
vid:
  description: vidision. solves for b in a × b = c
  domains:
    - c: COMPLEX
    - a: COMPLEX
  codomain: COMPLEX
pow:
  description: exponentiation. solves for c in a ^ b = c
  domains:
    - a: COMPLEX
    - b: COMPLEX
  codomain: COMPLEX
log:
  description: logarithm. solves for a in a ^ b = c
  domains:
    - c: COMPLEX
    - b: COMPLEX
  codomain: COMPLEX
root:
  description: root. solves for b in a ^ b = c
  domains:
    - c: COMPLEX
    - a: COMPLEX
  codomain: COMPLEX
